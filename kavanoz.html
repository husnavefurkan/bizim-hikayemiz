<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Aşk Kavanozu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <script>
        if (sessionStorage.getItem('siteUnlocked') !== 'true') {
            window.location.href = "login.html";
        }
    </script>

    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="timeline.html">Zaman Tüneli</a>
        <a href="bulmaca.html">Bulmaca</a>
        <a href="akrostis.html">Akrostiş</a>
        <a href="siir.html">Şiir</a>
        <a href="kavanoz.html" class="active">Kavanoz</a>
    </nav>

    <div class="jar-page">
        <div class="jar-intro">
            <h2>AŞK KAVANOZU</h2>
            <p>Bazen sana olan sevgimi tek bir cümleye sığdırmak zor oluyor.<br>Canın her sıkıldığında, beni her özlediğinde bu kalbe dokun...</p>
        </div>

        <div class="heart-jar" onclick="cekNot()">❤️</div>

        <div class="note-display" id="noteDisplay">
            <p class="placeholder-text">Kavanozdan bir not çekmek için kalbe dokun sevgilim...</p>
        </div>
    </div>

    <script>
        // KAVANOZDAKİ NOTLAR (Başına otomatik "Seni seviyorum çünkü..." eklenecek)
        const notlar = [
            "gülüşünle içimdeki bütün kışları yendin.",
            "bana dünyanın en şanslı insanı olduğumu hissettiriyorsun.",
            "gözlerime her baktığında zamanı durduruyorsun.",
            "sesini duyduğum an bütün dertlerimi unutuyorum.",
            "o sımsıcak ellerinle ellerimi hiç bırakmıyorsun.",
            "en saçma şakalarıma bile o güzel kahkahanla gülüyorsun.",
            "yanında tamamen kendim olabiliyorum.",
            "birlikte kurduğumuz hayallerin güzelliğine inanıyorum.",
            "sadece varlığınla bile bana huzur veriyorsun.",
            "benim o kullanmama güldüğün kelimeleri bile seviyorsun.",
            "Ganita'daki o ilk buluşmamızdaki heyecanı bana her gün yaşatıyorsun.",
            "aynalarda aradığım o bahar sabahı sensin.",
            "her yeni güne senin adınla uyanıyorum.",
            "kızdığında bile dünyanın en tatlı insanı oluyorsun.",
            "iyi ki hayatımdasın, sen benim her şeyimsin."
        ];

        let sonNotIndex = -1;

        function cekNot() {
            const display = document.getElementById('noteDisplay');
            const p = display.querySelector('p');
            
            // Efekti başlatmak için şeffaf yap
            display.style.opacity = 0;
            display.style.transform = 'translateY(10px)';

            setTimeout(() => {
                // Rastgele yeni bir not seç
                let yeniIndex;
                do {
                    yeniIndex = Math.floor(Math.random() * notlar.length);
                } while (yeniIndex === sonNotIndex && notlar.length > 1);
                
                sonNotIndex = yeniIndex;

                // Yeni notu ekrana bas ("Seni seviyorum çünkü..." başlığıyla birlikte)
                p.className = 'drawn-note';
                p.innerHTML = `<span style="font-size: 1.2rem; color: #aaa; font-family: 'Montserrat', sans-serif; font-style: italic; letter-spacing: 2px;">"Seni seviyorum çünkü..."</span><br><br>${notlar[yeniIndex]}`;

                // Ekranda yavaşça belirsin
                display.style.opacity = 1;
                display.style.transform = 'translateY(0)';
            }, 300);
        }
    </script>
</body>
</html>
